<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zlata Corpus Browser</title>
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161c;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #c77dff;
    --accent2: #e0aaff;
    --gold: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --text: #e8e8f0;
    --muted: #888899;
    --tag-bg: #2a1f3d;
    --tag-text: #c77dff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--accent2); letter-spacing: 0.04em; flex: 1; }
  #stats { font-size: 12px; color: var(--muted); }

  /* ── Load area ── */
  #load-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; gap: 16px; }
  #load-zone p { color: var(--muted); font-size: 13px; }
  .btn { background: var(--accent); color: #0e0e12; border: none; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: 0.85; }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Filters ── */
  #filters { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  #filters label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-right: 4px; }
  select, input[type=range] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer; }
  select:focus, input:focus { outline: none; border-color: var(--accent); }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  #score-val { color: var(--gold); font-weight: 600; font-size: 13px; min-width: 20px; }
  #search { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 13px; width: 200px; }

  /* ── Grid ── */
  #grid { padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

  /* ── Card ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .15s; }
  .card:hover { border-color: var(--accent); }
  .card-header { padding: 12px 14px 8px; display: flex; align-items: flex-start; gap: 8px; }
  .card-title { flex: 1; font-weight: 600; font-size: 13px; color: var(--accent2); line-height: 1.3; }
  .score-badge { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
  .score-badge.excellent { background: #1a3a2a; color: var(--green); }
  .score-badge.strong    { background: #2a2a10; color: var(--gold); }
  .score-badge.good      { background: #1e2030; color: #8899ff; }
  .score-badge.fair      { background: #2a1a1a; color: var(--red); }

  .card-meta { padding: 0 14px 8px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .pill.pose { border-color: #4a2a6a; background: #1e0f30; color: #c77dff; }
  .pill.energy { border-color: #1a3a4a; background: #0f2030; color: #7ec8e3; }
  .pill.tone { border-color: #2a3a1a; background: #1a2810; color: #a8d8a8; }

  .tags { padding: 0 14px 8px; display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; background: var(--tag-bg); color: var(--tag-text); padding: 1px 7px; border-radius: 4px; }

  .card-body { padding: 0 14px; flex: 1; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
  .reusable { font-size: 13px; line-height: 1.6; color: var(--text); font-style: italic; }
  .exact { font-size: 12px; line-height: 1.5; color: var(--muted); max-height: 80px; overflow: hidden; position: relative; cursor: pointer; }
  .exact.expanded { max-height: none; }
  .exact::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(transparent, var(--surface)); pointer-events: none; }
  .exact.expanded::after { display: none; }
  .dna { font-size: 12px; color: #b8a0cc; margin-top: 6px; }
  .why { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }

  .card-footer { padding: 10px 14px 12px; display: flex; gap: 8px; border-top: 1px solid var(--border); margin-top: 10px; }

  /* ── Empty ── */
  #empty { display: none; padding: 60px; text-align: center; color: var(--muted); grid-column: 1/-1; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #0e0e12; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; }

  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <h1>⚡ Zlata Corpus Browser</h1>
  <span id="stats"></span>
  <button class="btn btn-sm btn-ghost" onclick="document.getElementById('file-input').click()">Load JSONL</button>
  <input type="file" id="file-input" accept=".jsonl,.json" onchange="loadFile(this)">
</header>

<div id="load-zone">
  <p>Load your <strong>corpus_mined.jsonl</strong> to begin</p>
  <button class="btn" onclick="document.getElementById('file-input').click()">📂 Open corpus_mined.jsonl</button>
  <p style="font-size:12px">File stays local — nothing is uploaded.</p>
</div>

<div id="filters" style="display:none">
  <div class="filter-group">
    <label>Pose</label>
    <select id="f-pose" onchange="render()">
      <option value="">All</option>
      <option>throughbend</option>
      <option>cheststand</option>
      <option>triplefold</option>
      <option>headsit</option>
      <option>oversplit</option>
      <option>ribbon-suspension</option>
      <option>other</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Match</label>
    <select id="f-match" onchange="render()">
      <option value="">All</option>
      <option>excellent</option>
      <option>strong</option>
      <option>good</option>
      <option>fair</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Min score</label>
    <input type="range" id="f-score" min="1" max="10" value="1" step="1" oninput="document.getElementById('score-val').textContent=this.value; render()">
    <span id="score-val">1</span>
  </div>
  <div class="filter-group">
    <label>Portability</label>
    <select id="f-port" onchange="render()">
      <option value="">All</option>
      <option>high</option>
      <option>medium</option>
      <option>low</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Energy</label>
    <select id="f-energy" onchange="render()">
      <option value="">All</option>
      <option>confident-performer</option>
      <option>shy-explorer</option>
      <option>playful-partner</option>
      <option>intense-devotee</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Sort</label>
    <select id="f-sort" onchange="render()">
      <option value="score-desc">Score ↓</option>
      <option value="score-asc">Score ↑</option>
      <option value="title">Title A-Z</option>
    </select>
  </div>
  <input id="search" type="text" placeholder="Search tags, title, text…" oninput="render()">
</div>

<div id="grid"></div>
<div id="toast">Copied!</div>

<script>
let allScenes = []; // flat array: each item = scene merged with story metadata

function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split('\n');
    allScenes = [];
    for (const line of lines) {
      if (!line.trim()) continue;
      try {
        const story = JSON.parse(line);
        if (!story.scenes || !story.scenes.length) continue;
        for (const scene of story.scenes) {
          allScenes.push({
            storyId: story.storyId,
            title: story.title,
            characterEnergy: story.characterEnergy,
            toneRegister: story.toneRegister,
            whyItFits: story.whyItFits,
            ...scene
          });
        }
      } catch(err) { /* skip bad lines */ }
    }
    document.getElementById('load-zone').style.display = 'none';
    document.getElementById('filters').style.display = 'flex';
    render();
  };
  reader.readAsText(file);
}

function render() {
  const pose    = document.getElementById('f-pose').value;
  const match   = document.getElementById('f-match').value;
  const minScore = parseInt(document.getElementById('f-score').value);
  const port    = document.getElementById('f-port').value;
  const energy  = document.getElementById('f-energy').value;
  const sort    = document.getElementById('f-sort').value;
  const q       = document.getElementById('search').value.toLowerCase();

  let scenes = allScenes.filter(s => {
    if (pose   && s.poseFamily !== pose)     return false;
    if (match  && s.matchBand  !== match)    return false;
    if (s.score < minScore)                  return false;
    if (port   && s.portability !== port)    return false;
    if (energy && s.characterEnergy !== energy) return false;
    if (q) {
      const haystack = [s.title, s.reusableWording, s.exactWording, s.dna, ...(s.tags||[])].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'score-desc') scenes.sort((a,b) => b.score - a.score);
  else if (sort === 'score-asc') scenes.sort((a,b) => a.score - b.score);
  else if (sort === 'title') scenes.sort((a,b) => (a.title||'').localeCompare(b.title||''));

  const grid = document.getElementById('grid');
  document.getElementById('stats').textContent = `${scenes.length} / ${allScenes.length} scenes`;

  if (!scenes.length) {
    grid.innerHTML = '<div id="empty" style="display:block; padding:60px; text-align:center; color:#888899; grid-column:1/-1;">No scenes match filters.</div>';
    return;
  }

  grid.innerHTML = scenes.map((s, i) => card(s, i)).join('');
}

function card(s, i) {
  const band = s.matchBand || 'good';
  const scoreLabel = s.score >= 9 ? 'excellent' : s.score >= 7 ? 'strong' : s.score >= 5 ? 'good' : 'fair';
  const tags = (s.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  return `
<div class="card">
  <div class="card-header">
    <div class="card-title">${esc(s.title || s.storyId)}</div>
    <span class="score-badge ${scoreLabel}">${s.score}/10 ${band}</span>
  </div>
  <div class="card-meta">
    <span class="pill pose">${esc(s.poseFamily||'—')}</span>
    ${s.characterEnergy ? `<span class="pill energy">${esc(s.characterEnergy)}</span>` : ''}
    ${s.toneRegister ? `<span class="pill tone">${esc(s.toneRegister)}</span>` : ''}
    <span class="pill">port: ${esc(s.portability||'—')}</span>
  </div>
  ${tags ? `<div class="tags">${tags}</div>` : ''}
  <div class="card-body">
    <div class="section-label">Reusable seed</div>
    <div class="reusable">${esc(s.reusableWording||'')}</div>
    ${s.dna ? `<div class="dna">🧬 ${esc(s.dna)}</div>` : ''}
    ${s.whyItFits ? `<div class="why">📎 ${esc(s.whyItFits)}</div>` : ''}
    <div class="section-label" style="margin-top:10px">Original excerpt</div>
    <div class="exact" id="ex-${i}" onclick="toggleExact(${i})">${esc(s.exactWording||'')}</div>
  </div>
  <div class="card-footer">
    <button class="btn btn-sm" onclick='copyText(${JSON.stringify(s.reusableWording||"")})'>Copy seed</button>
    <button class="btn btn-sm btn-ghost" onclick='copyText(${JSON.stringify(s.exactWording||"")})'>Copy excerpt</button>
  </div>
</div>`;
}

function toggleExact(i) {
  document.getElementById('ex-'+i).classList.toggle('expanded');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
