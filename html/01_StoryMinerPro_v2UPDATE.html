.story-card { background:#1b2330; border-radius:12px; overflow:hidden; cursor:pointer; transition:all .2s cubic-bezier(0.16,1,0.3,1); margin-bottom:16px; }

.pose-tag { font-size:0.75rem; padding:2px 8px; background:var(--accent-dim); color:var(--accent); border-radius:9999px; }
.detail-drawer { position:fixed; bottom:0; left:0; right:0; height:85vh; background:#0a0f1a; border-top:4px solid #70dfcb; transform:translateY(100%); transition:transform .4s cubic-bezier(0.16,1,0.3,1); overflow-y:auto; z-index:100; }
.detail-drawer.open { transform:translateY(0); }
.reusable { background:#131925; padding:16px; border-radius:8px; margin:12px 0; font-style:italic; line-height:1.7; }

// ====================== DASHBOARD RENDERING ======================
function renderAll() {

function openDrawer(story) {

  document.getElementById('drawerTitle').innerHTML = `<span style="color:#70dfcb;">${story.seedMode}</span> — ${story.title}`;

}

function closeDrawer() {
  document.getElementById('detailDrawer').classList.remove('open');
