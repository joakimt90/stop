```javascript
// INJECT INTO: <script> section

function buildOutline() {
  const genMale = (document.getElementById('genMale') || {}).value || '';
  const genFemale = (document.getElementById('genFemale') || {}).value || '';
  const genScenario = (document.getElementById('genScenario') || {}).value || '';
  const genMoves = (document.getElementById('genMoves') || {}).value || '';
  const genDynamics = (document.getElementById('genDynamics') || {}).value || '';
  const genMode = (document.getElementById('genMode') || {}).value || '';
  const explicitness = (document.getElementById('explicitness') || {}).value || '';
  const seedMode = (document.getElementById('seedMode') || {}).value || '';

  const modeLabels = {
    'faithful_match': 'Faithful Zlata Match',
    'romantic_variation': 'Softer Romantic Variation',
    'training_variation': 'Training-Focused',
    'voyeuristic_discovery': 'Voyeuristic Discovery',
    'chemistry_slowburn': 'Chemistry Slow-Burn'
  };

  const modeLabel = modeLabels[genMode] || genMode;

  const moves = genMoves.split(',').map(m => m.trim()).filter(m => m);
  const movesHTML = moves.length 
    ? '<ul>' + moves.map(m => '<li>' + m + '</li>').join('') + '</ul>'
    : '<em>None specified</em>';

  const outlineHTML = `
    <h4>Story Outline</h4>
    <dl>
      <dt>Protagonist role</dt>
      <dd>${genMale || 'ordinary male narrator'}</dd>
      <dt>Heroine type</dt>
      <dd>${genFemale || 'contortionist'}</dd>
      <dt>Setup</dt>
      <dd>${genScenario || '<em>Not specified</em>'}</dd>
      <dt>Main flexibility beats</dt>
      <dd>${movesHTML}</dd>
      <dt>Chemistry arc</dt>
      <dd>${modeLabel}${genDynamics ? ' — ' + genDynamics : ''}</dd>
      <dt>Explicitness ceiling</dt>
      <dd>${explicitness || '<em>Not specified</em>'}</dd>
      <dt>Seed mode</dt>
      <dd>${seedMode || '<em>Not specified</em>'}</dd>
    </dl>
  `;

  document.getElementById('outlineContent').innerHTML = outlineHTML;
  document.getElementById('outlineCard').style.display = 'block';
  
  // Reset approve button visibility in case outline is rebuilt
  document.getElementById('approveOutlineBtn').style.display = 'block';
  
  // Remove any previous approval note
  const existingNote = document.querySelector('.outline-approved');
  if (existingNote) {
    existingNote.remove();
  }
  
  // Keep generate button disabled
  document.getElementById('generateBtn').disabled = true;
}

function approveOutline() {
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('approveOutlineBtn').style.display = 'none';
  
  // Add visual confirmation
  const note = document.createElement('p');
  note.className = 'outline-approved';
  note.textContent = '✓ Outline approved — generate when ready';
  document.getElementById('outlineCard').appendChild(note);
}
```
