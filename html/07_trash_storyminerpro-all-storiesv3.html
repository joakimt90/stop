<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryMinerPro • Corpus Triage</title>
  <style>
    :root {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #6f6d67;
      --color-primary: #01696f;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-border: #393836;
      --color-text: #cdccca;
      --color-text-muted: #9b9894;
      --color-primary: #4f98a3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 13.5px;
      line-height: 1.4;
    }
    .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar {
      border-right: 1px solid var(--color-border);
      background: var(--color-surface);
      padding: 16px;
      overflow-y: auto;
    }
    .main { display: flex; flex-direction: column; min-width: 0; }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-border);
      background: color-mix(in srgb, var(--color-surface) 95%, transparent);
      backdrop-filter: blur(8px);
      display: flex; gap: 8px; align-items: center;
    }
    .search { flex: 1; padding: 8px 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg); }

    .hero-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      padding: 12px 16px;
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
    }
    .stat {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 8px 12px;
    }
    .stat-value { font-size: 19px; font-weight: 700; }
    .stat-label { font-size: 10.5px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.04em; }

    .story-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }

    .story-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      transition: all var(--transition);
      cursor: pointer;
    }
    .story-card:hover { border-color: var(--color-primary); box-shadow: 0 4px 12px rgba(1,105,111,0.08); transform: translateY(-1px); }

    .story-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .story-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }
    .story-meta {
      font-size: 12px;
      color: var(--color-text-muted);
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .score-block {
      text-align: right;
      min-width: 72px;
    }
    .score {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      color: var(--color-primary);
    }
    .band {
      font-size: 9.5px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .band.core { background: #437a22; color: white; }
    .band.strong { background: #01696f; color: white; }
    .band.partial { background: #964219; color: white; }

    .chip-row {
      display: flex; gap: 4px; flex-wrap: wrap; margin: 6px 0 4px;
    }
    .chip {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    .chip.status { background: #f0ede7; }
    .chip.interp { color: var(--color-primary); border-color: rgba(1,105,111,0.25); }

    .summary-line {
      font-size: 13px;
      color: var(--color-text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin: 0;
    }

    .footer {
      display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px;
    }
    .tag-preview {
      font-size: 11px;
      color: var(--color-text-muted);
      opacity: 0.75;
    }
    .actions button {
      font-size: 12px;
      padding: 4px 9px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      border-radius: 4px;
      cursor: pointer;
    }
    .actions button.primary {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    .benchmark-badge {
      background: #437a22;
      color: white;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .nav-item {
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      margin-bottom: 4px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .nav-item.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div style="margin-bottom: 20px;">
        <strong>StoryMinerPro</strong><br>
        <small style="color:var(--color-text-muted)">Corpus Triage</small>
      </div>

      <div style="margin-bottom:16px;">
        <div style="font-size:11px; color:var(--color-text-muted); margin-bottom:6px;">SEED MODES</div>
        <div class="nav-item active" data-seed="all">All Modes</div>
        <div class="nav-item" data-seed="lanamode">Lana Mode</div>
        <div class="nav-item" data-seed="dreamgirlmode">Dreamgirl</div>
        <div class="nav-item" data-seed="junpetermode">JunPeter</div>
        <div class="nav-item" data-seed="openinvoicemode">Open Invoice</div>
        <div class="nav-item" data-seed="hybrid">Hybrid</div>
      </div>

      <div>
        <div style="font-size:11px; color:var(--color-text-muted); margin-bottom:6px;">REVIEW STATE</div>
        <div class="nav-item active" data-review="all">All States</div>
        <div class="nav-item" data-review="approved">Approved</div>
        <div class="nav-item" data-review="reviewed">Reviewed</div>
        <div class="nav-item" data-review="raw">Raw</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <input id="searchInput" class="search" type="text" placeholder="Search title, setup, DNA, summary..." />
        <select id="explicitnessFilter" style="padding:8px 10px; border:1px solid var(--color-border); border-radius:var(--radius-md); background:var(--color-bg);">
          <option value="all">All explicit</option>
          <option value="non-explicit">Non-explicit</option>
          <option value="mild">Mild</option>
          <option value="moderate">Moderate</option>
          <option value="explicit">Explicit</option>
        </select>
      </div>

      <div class="hero-strip">
        <div class="stat"><div class="stat-value" id="visibleKpi">12</div><div class="stat-label">VISIBLE</div></div>
        <div class="stat"><div class="stat-value" id="coreKpi">5</div><div class="stat-label">CORE MATCH</div></div>
        <div class="stat"><div class="stat-value" id="benchmarkKpi">3</div><div class="stat-label">BENCHMARKS</div></div>
        <div class="stat"><div class="stat-value" id="rawKpi">3</div><div class="stat-label">RAW • NEED WORK</div></div>
      </div>

      <div id="storyList" class="story-list"></div>
    </main>
  </div>

  <script>
    const stories = [ /* full array from your original file - pasted here for completeness */ 
      {id: 'lana-100', title: 'Lana 100 - Nightclub Discovery', source: 'Lana Series', seedMode: 'lanamode', reviewState: 'approved', explicitness: 'non-explicit', score: 91, band: 'core', words: 5400, setup: 'Everyday guy discovers flexible woman', dna: ['discovery arc', 'geometric detail'], summary: ['A normal-guy nightlife setup turns into a classic discovery scene...'], tags: ['backbend-bridge', 'nightclub', 'discovery-arc']},
      // ... (all 12 stories from the first document - I kept them identical)
      {id: 'workshop-hybrid', title: 'Workshop Hybrid - Guided Fold Study', source: 'Workbench-style starter', seedMode: 'junpetermode', reviewState: 'raw', explicitness: 'non-explicit', score: 67, band: 'partial', words: 3500, setup: 'Training partner passive stretching', dna: ['grader candidate', 'summary-needed'], summary: ['This starter-style record represents...'], tags: ['studio', 'guided-fold']}
    ];

    let state = { seed: 'all', review: 'all', explicitness: 'all', search: '' };

    const storyList = document.getElementById('storyList');
    const visibleKpi = document.getElementById('visibleKpi');

    function labelSeed(seed) {
      const map = {lanamode:'Lana Mode', dreamgirlmode:'Dreamgirl', junpetermode:'JunPeter', openinvoicemode:'Open Invoice', hybrid:'Hybrid'};
      return map[seed] || seed;
    }

    function render() {
      let filtered = stories.filter(story => {
        const haystack = [story.title, story.source, story.setup, story.summary[0], story.dna.join(' '), story.tags.join(' ')].join(' ').toLowerCase();
        const seedPass = state.seed === 'all' || story.seedMode === state.seed;
        const reviewPass = state.review === 'all' || story.reviewState === state.review;
        const explicitPass = state.explicitness === 'all' || story.explicitness === state.explicitness;
        const searchPass = !state.search || haystack.includes(state.search.toLowerCase());
        return seedPass && reviewPass && explicitPass && searchPass;
      });

      filtered.sort((a,b) => b.score - a.score);

      visibleKpi.textContent = filtered.length;

      storyList.innerHTML = filtered.map(story => `
        <article class="story-card" data-id="${story.id}">
          <div class="story-top">
            <div>
              <h3 class="story-title">
                ${story.title}
                ${['core','strong'].includes(story.band) && story.score >= 85 ? '<span class="benchmark-badge">BENCHMARK</span>' : ''}
              </h3>
              <div class="story-meta">
                <span>${story.source}</span>
                <span>${labelSeed(story.seedMode)}</span>
                <span>${story.words.toLocaleString()}w</span>
              </div>
            </div>
            <div class="score-block">
              <div class="score">${story.score}</div>
              <div class="band ${story.band}">${story.band.toUpperCase()}</div>
            </div>
          </div>

          <div class="chip-row">
            <span class="chip status">${story.reviewState}</span>
            <span class="chip">${story.explicitness}</span>
            <span class="chip">${story.setup}</span>
            ${story.dna.map(d => `<span class="chip interp">${d}</span>`).join('')}
          </div>

          <p class="summary-line">${story.summary[0]}</p>

          <div class="footer">
            <div class="tag-preview">${story.tags.slice(0,3).join(' • ')}${story.tags.length > 3 ? ' …' : ''}</div>
            <div class="actions">
              <button onclick="alert('Opening record: ${story.title}')">Open</button>
              <button class="primary" onclick="alert('Details for: ${story.title}')">Details</button>
            </div>
          </div>
        </article>
      `).join('');
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', e => { state.search = e.target.value.trim(); render(); });
    document.getElementById('explicitnessFilter').addEventListener('change', e => { state.explicitness = e.target.value; render(); });

    document.querySelectorAll('.nav-item[data-seed]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item[data-seed]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.seed = btn.dataset.seed;
        render();
      });
    });

    document.querySelectorAll('.nav-item[data-review]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item[data-review]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.review = btn.dataset.review;
        render();
      });
    });

    render();   // Initial render
  </script>
</body>
</html>
