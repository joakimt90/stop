<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryMinerPro • Corpus Triage • Zlata Flex</title>
  <style>
    :root {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #6f6d67;
      --color-primary: #01696f;
      --color-accent: #437a22;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-border: #393836;
      --color-text: #cdccca;
      --color-text-muted: #9b9894;
      --color-primary: #4f98a3;
      --color-accent: #6daa45;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 13.5px;
      line-height: 1.4;
    }
    .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar {
      border-right: 1px solid var(--color-border);
      background: var(--color-surface);
      padding: 16px;
      overflow-y: auto;
    }
    .main { display: flex; flex-direction: column; min-width: 0; position: relative; }

    .topbar {
      position: sticky; top: 0; z-index: 20;
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-border);
      background: color-mix(in srgb, var(--color-surface) 96%, transparent);
      backdrop-filter: blur(12px);
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .search { flex: 1; padding: 9px 14px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg); font-size: 14px; }
    .toggle-group { display: flex; border: 1px solid var(--color-border); border-radius: var(--radius-sm); overflow: hidden; background: var(--color-surface-2); }
    .toggle-btn { padding: 6px 14px; font-size: 13px; cursor: pointer; transition: var(--transition); }
    .toggle-btn.active { background: var(--color-primary); color: white; }

    .band-pills { display: flex; gap: 4px; margin: 0 8px; }
    .pill { padding: 4px 14px; font-size: 12.5px; border-radius: 9999px; cursor: pointer; transition: var(--transition); background: var(--color-surface-2); border: 1px solid var(--color-border); color: var(--color-text-muted); }
    .pill.active, .pill:hover { background: var(--color-primary); color: white; border-color: var(--color-primary); }

    .hero-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      padding: 12px 16px;
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
    }
    .stat { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 8px 12px; text-align: center; }
    .stat-value { font-size: 21px; font-weight: 700; }
    .stat-label { font-size: 10.5px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .story-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .story-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 10px;
      transition: all var(--transition);
      cursor: pointer;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .story-card:hover { border-color: var(--color-primary); box-shadow: 0 6px 16px rgba(1,105,111,0.12); transform: translateY(-2px); }
    .thumbnail {
      width: 64px; height: 88px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: var(--transition);
    }
    .story-card:hover .thumbnail { transform: scale(1.06); }

    .card-content { flex: 1; min-width: 0; }
    .story-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .story-title { font-size: 15px; font-weight: 700; margin: 0 0 3px; }
    .story-meta { font-size: 12px; color: var(--color-text-muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .score-block { text-align: right; min-width: 68px; }
    .score { font-size: 23px; font-weight: 700; line-height: 1; color: var(--color-primary); }
    .band { font-size: 9.5px; padding: 2px 7px; border-radius: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .band.core { background: #437a22; color: white; }
    .band.strong { background: #01696f; color: white; }
    .band.partial { background: #964219; color: white; }

    .chip-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 7px 0 5px; }
    .chip {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: var(--color-surface-2); border: 1px solid var(--color-border); color: var(--color-text-muted);
    }
    .chip.interp { color: var(--color-primary); }

    .summary-line {
      font-size: 13.2px; color: var(--color-text);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; }
    .tag-preview { font-size: 11px; color: var(--color-text-muted); opacity: 0.8; }
    .heart { font-size: 18px; cursor: pointer; transition: var(--transition); }
    .heart.filled { color: #e33; }

    .table-view table { width: 100%; border-collapse: collapse; }
    .table-view th, .table-view td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--color-border); }
    .table-view th { font-size: 12px; color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; }

    .drawer {
      position: fixed; top: 0; right: -420px; width: 420px; height: 100vh;
      background: var(--color-surface); border-left: 1px solid var(--color-border);
      box-shadow: -10px 0 30px rgba(0,0,0,0.15); transition: right var(--transition);
      z-index: 100; padding: 20px; overflow-y: auto;
    }
    .drawer.open { right: 0; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .drawer-close { font-size: 28px; cursor: pointer; line-height: 1; }
    .drawer-title { font-size: 18px; font-weight: 700; }
    .full-summary p { margin-bottom: 14px; }
  </style>
</head>

  <script>

      {id: 'lana-112', title: 'Lana Part 3 - Reunion Night', source: 'Lana Series', seedMode: 'lanamode', reviewState: 'reviewed', explicitness: 'explicit', score: 80, band: 'strong', words: 7800, setup: 'Reunion second encounter', consent: 'Clearly consensual', dna: ['payoff encounter', 'return visit'], tags: ['reunion', 'escalation'], summary: ['This later Lana entry shows the franchise-like version of the formula: a returning heroine and payoff built on prior memory.']},
      {id: 'workshop-hybrid', title: 'Workshop Hybrid - Guided Fold Study', source: 'Workbench-style starter', seedMode: 'junpetermode', reviewState: 'raw', explicitness: 'non-explicit', score: 67, band: 'partial', words: 3500, setup: 'Training partner passive stretching', consent: 'Clearly consensual', dna: ['grader candidate', 'summary-needed'], tags: ['studio', 'guided-fold'], summary: ['This starter-style record bridges StoryMinerPro extraction logic with workbench-style grading fields.']}
    ];

    let state = {
      seed: 'all',
      review: 'all',
      explicitness: 'all',
      band: 'all',
      search: '',
      viewMode: 'cards',
      shortlisted: new Set()
    };

    function labelSeed(seed) {
      const map = {lanamode:'Lana Mode', dreamgirlmode:'Dreamgirl', junpetermode:'JunPeter', openinvoicemode:'Open Invoice', hybrid:'Hybrid'};
      return map[seed] || seed;
    }

    function getThumbnail(id) {

        'lana-100': 'file:///Users/joakimthomter/Desktop/9PROJECTS/STORIES/imgs/2/30-02_014 XXXX.JPG',

    const coreKpi = document.getElementById('coreKpi');
    const benchmarkKpi = document.getElementById('benchmarkKpi');
    const shortlistKpi = document.getElementById('shortlistKpi');

          (state.seed === 'all' || story.seedMode === state.seed) &&
          (state.review === 'all' || story.reviewState === state.review) &&
          (state.explicitness === 'all' || story.explicitness === state.explicitness) &&
          (state.band === 'all' || story.band === state.band) &&
          (!state.search || haystack.includes(state.search.toLowerCase()))

      });

      coreKpi.textContent = stories.filter(s => s.band === 'core').length;
      benchmarkKpi.textContent = stories.filter(s => s.score >= 85 && ['core','strong'].includes(s.band)).length;

    window.openDrawer = function(id) {

          ${story.summary.map(p => `<p>${p}</p>`).join('')}
        </div>
        <div style="margin-top:24px;"><strong>DNA:</strong> ${story.dna.join(' • ')}</div>
        <div style="margin-top:12px;"><strong>Tags:</strong> ${story.tags.join(' • ')}</div>
        <div style="margin-top:32px;display:flex;gap:8px;">
          <button onclick="alert('Approved & exported to seed pool');" style="flex:1;padding:12px;background:var(--color-accent);color:white;border:none;border-radius:8px;cursor:pointer;">Approve & Seed</button>
          <button onclick="toggleShortlist('${story.id}');" style="flex:1;padding:12px;background:var(--color-primary);color:white;border:none;border-radius:8px;cursor:pointer;">Shortlist</button>
        </div>
      `;
      drawer.classList.add('open');
    };

    window.toggleShortlist = function(id) {
      if (state.shortlisted.has(id)) state.shortlisted.delete(id);
      else state.shortlisted.add(id);
      render();
    };

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', e => { state.search = e.target.value.trim(); render(); });
    document.getElementById('explicitnessFilter').addEventListener('change', e => { state.explicitness = e.target.value; render(); });

    document.getElementById('viewCards').addEventListener('click', () => {
      state.viewMode = 'cards';
      document.getElementById('viewCards').classList.add('active');
      document.getElementById('viewTable').classList.remove('active');
      render();
    });
    document.getElementById('viewTable').addEventListener('click', () => {
      state.viewMode = 'table';
      document.getElementById('viewTable').classList.add('active');
      document.getElementById('viewCards').classList.remove('active');
      render();
    });

    document.querySelectorAll('.pill').forEach(p => {
      p.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
        state.band = p.dataset.band;
        render();
      });
    });

    document.querySelectorAll('.nav-item[data-seed]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item[data-seed]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.seed = btn.dataset.seed;
        render();
      });
    });
    document.querySelectorAll('.nav-item[data-review]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item[data-review]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.review = btn.dataset.review;
        render();
      });
    });

    document.getElementById('closeDrawer').addEventListener('click', () => {
      document.getElementById('detailDrawer').classList.remove('open');
    });

    render();
  </script>
</body>
</html>
