<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMiner Corpus Browser</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { border-bottom: 1px solid var(--text-muted); padding-bottom: 20px; margin-bottom: 30px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 300px; background: var(--card-bg); color: white; }
        
        /* Grid Layout */
        #library { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        /* Card Design */
        .card { background: var(--card-bg); border-radius: 8px; padding: 20px; border: 1px solid #334155; transition: transform 0.2s; cursor: pointer; }
        .card:hover { border-color: var(--accent); }
        .score { float: right; background: var(--accent); color: var(--bg); font-weight: bold; padding: 2px 8px; border-radius: 4px; }
        .tag { display: inline-block; background: #0ea5e9; font-size: 11px; padding: 2px 6px; border-radius: 3px; margin: 2px; }
        .state-raw { border-left: 4px solid #ef4444; }
        .state-approved { border-left: 4px solid #10b981; }
        
        /* Modal/Reader View */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; padding: 50px; box-sizing: border-box; }
        .modal-content { max-width: 900px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: 12px; }
        .scene { background: #334155; padding: 15px; margin: 15px 0; border-radius: 8px; }
        .exact { font-style: italic; color: var(--text-muted); border-left: 2px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }
        .reusable { color: white; font-weight: 500; }
        .close-btn { position: sticky; top: 0; float: right; font-size: 30px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>StoryMiner: Z-Style Corpus</h1>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search titles, tags, or summaries..." onkeyup="filterStories()">
    </div>
</header>

<div id="library"></div>

<div id="reader" class="modal">
    <div class="modal-content" id="readerContent"></div>
</div>

<script>
const data = [ /* PASTE YOUR JSON HERE */ ];

function renderLibrary(stories) {
    const container = document.getElementById('library');
    container.innerHTML = '';
    stories.forEach(story => {
        const div = document.createElement('div');
        div.className = `card state-${story.review_state}`;
        div.onclick = () => openReader(story);
        div.innerHTML = `
            <span class="score">${story.zstyle_score || 'N/A'}</span>
            <h3>${story.title}</h3>
            <p style="font-size: 0.9em; color: var(--text-muted)">${story.summary.substring(0, 100)}...</p>
            <div>${story.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        `;
        container.appendChild(div);
    });
}

function openReader(story) {
    const reader = document.getElementById('reader');
    const content = document.getElementById('readerContent');
    
    let scenesHtml = story.scenes.map(s => `
        <div class="scene">
            <div class="exact">" ${s.exactWording} "</div>
            <div class="reusable">${s.reusableWording}</div>
            <div style="margin-top:10px">${s.tags.map(t => `<span class="tag" style="background:#475569">${t}</span>`).join('')}</div>
        </div>
    `).join('');

    content.innerHTML = `
        <span class="close-btn" onclick="document.getElementById('reader').style.display='none'">&times;</span>
        <h2>${story.title}</h2>
        <p><strong>DNA:</strong> ${story.dna.join(', ')}</p>
        <p><strong>Focus:</strong> ${story.contortion_focus}</p>
        <hr>
        <h4>Detailed Scenes</h4>
        ${scenesHtml || '<p>No structured scenes available for this entry.</p>'}
    `;
    reader.style.display = 'block';
}

function filterStories() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = data.filter(s => 
        s.title.toLowerCase().includes(term) || 
        s.tags.some(t => t.toLowerCase().includes(term)) ||
        s.summary.toLowerCase().includes(term)
    );
    renderLibrary(filtered);
}

renderLibrary(data);
</script>
</body>
</html>
