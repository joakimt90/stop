#app {

  font-style: italic; 
}

.filter-group { 
  margin-bottom: 24px; 
}
.filter-group label { 
  display: block; 
  font-size: 11px; 
  text-transform: uppercase; 
  letter-spacing: 0.8px; 
  color: #888; 
  margin-bottom: 8px; 
  font-weight: 600; 
}
.filter-group input, .filter-group select { 
  width: 100%; 
  padding: 10px 12px; 
  background: #1a1a1a; 
  border: 1px solid #333; 
  border-radius: 6px; 
  color: #e0e0e0; 
  font-size: 14px; 
  transition: all 0.2s; 
}
.filter-group input:focus, .filter-group select:focus { 
  outline: none; 
  border-color: #ff4d6d; 
  background: #222; 
}
.filter-group select { 
  cursor: pointer; 
}

#kpiStrip { 
  background: #1a1a1a; 
  border-top: 1px solid #2a2a2a; 
  padding: 12px 16px; 
  display: flex; 
  gap: 24px; 
  font-size: 12px; 
}
.kpi { 
  display: flex; 
  flex-direction: column; 
  gap: 4px; 
}
.kpi-label { 
  color: #888; 
  text-transform: uppercase; 
  letter-spacing: 0.5px; 
  font-size: 10px; 
}
.kpi-value { 
  color: #ff4d6d; 
  font-size: 16px; 
  font-weight: 700; 
}

/* Main content */
#main { 
  flex: 1; 
  display: flex; 
  flex-direction: column; 
  overflow: hidden; 
}
#cardsContainer { 
  flex: 1; 
  overflow-y: auto; 
  padding: 24px; 
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
  gap: 20px; 
  align-content: start; 
}

.story-card { 
  background: linear-gradient(135deg, #1a1a1a 0%, #141414 100%); 
  border: 1px solid #2a2a2a; 
  border-radius: 12px; 
  padding: 20px; 
  cursor: pointer; 
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
  position: relative; 
  overflow: hidden; 
}
.story-card::before { 
  content: ''; 
  position: absolute; 
  top: 0; 
  left: 0; 
  right: 0; 
  height: 3px; 
  background: linear-gradient(90deg, #ff4d6d 0%, #ff758f 100%); 
  transform: scaleX(0); 
  transform-origin: left; 
  transition: transform 0.3s; 
}
.story-card:hover { 
  border-color: #ff4d6d; 
  transform: translateY(-2px); 
  box-shadow: 0 8px 24px rgba(255, 77, 109, 0.15); 
}
.story-card:hover::before { 
  transform: scaleX(1); 
}

.story-title { 
  font-size: 16px; 
  font-weight: 600; 
  color: #ff758f; 
  margin-bottom: 8px; 
  line-height: 1.3; 
}
.story-meta { 
  display: flex; 
  gap: 12px; 
  font-size: 11px; 
  color: #888; 
  margin-bottom: 12px; 
  flex-wrap: wrap; 
}
.story-meta span { 
  display: flex; 
  align-items: center; 
  gap: 4px; 
}
.story-summary { 
  font-size: 13px; 
  color: #aaa; 
  line-height: 1.5; 
  margin-bottom: 12px; 
  display: -webkit-box; 
  -webkit-line-clamp: 3; 
  -webkit-box-orient: vertical; 
  overflow: hidden; 
}
.story-tags { 
  display: flex; 
  flex-wrap: wrap; 
  gap: 6px; 
}
.tag { 
  background: #222; 
  color: #ff758f; 
  padding: 4px 10px; 
  border-radius: 12px; 
  font-size: 10px; 
  font-weight: 500; 
  letter-spacing: 0.3px; 
  border: 1px solid #333; 
}

/* Drawer */
#drawer { 
  position: fixed; 
  right: -600px; 
  top: 0; 
  width: 600px; 
  height: 100vh; 
  background: #0f0f0f;

#drawerContent {

  right: 16px;

// State
let filteredStories = [...DB.stories];

// DOM Elements
const searchInput = document.getElementById('searchInput');
const seedModeFilter = document.getElementById('seedModeFilter');
const matchBandFilter = document.getElementById('matchBandFilter');
const cardsContainer = document.getElementById('cardsContainer');
const drawer = document.getElementById('drawer');
const drawerBody = document.getElementById('drawerBody');
const closeDrawer = document.getElementById('closeDrawer');
const kpiTotal = document.getElementById('kpiTotal');
const kpiVisible = document.getElementById('kpiVisible');
const kpiScenes = document.getElementById('kpiScenes');

// Filter logic
function applyFilters() {
  const searchTerm = searchInput.value.toLowerCase();
  const seedMode = seedModeFilter.value;
  const matchBand = matchBandFilter.value;
  
  filteredStories = DB.stories.filter(story => {
    // Search
    if (searchTerm) {
      const searchableText = [
        story.title,
        story.summary || '',
        ...(story.tags || [])
      ].join(' ').toLowerCase();
      if (!searchableText.includes(searchTerm)) return false;
    }
    
    // Seed mode
    if (seedMode !== 'all' && story.seedMode !== seedMode) return false;
    
    // Match band
    if (matchBand !== 'all' && story.matchBand !== matchBand) return false;
    
    return true;
  });
  
  renderCards();
  updateKPIs();
}

// Render cards
function renderCards() {
  cardsContainer.innerHTML = '';
  
  filteredStories.forEach(story => {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.onclick = () => openDrawer(story);
    
    const sceneCount = (story.scenes || []).length;
    
    card.innerHTML = `
      <div class="story-title">${story.title}</div>
      <div class="story-meta">
        <span>🌱 ${story.seedMode || 'unknown'}</span>
        <span>⭐ ${story.matchBand || 'N/A'}</span>
        <span>📊 ${story.score || 0}</span>
        ${sceneCount > 0 ? `<span>🎬 ${sceneCount} scenes</span>` : ''}
      </div>
      <div class="story-summary">${story.summary || 'No summary available.'}</div>
      ${story.tags && story.tags.length > 0 ? `
        <div class="story-tags">
          ${story.tags.slice(0, 4).map(tag => `<span class="tag">${tag}</span>`).join('')}
        </div>
      ` : ''}
    `;
    
    cardsContainer.appendChild(card);
  });
}

// Open drawer
function openDrawer(story) {
  const sceneCount = (story.scenes || []).length;
  
  let scenesHTML = '';
  if (sceneCount > 0) {
    scenesHTML = `
      <div class="drawer-section">
        <h3>Reusable Scenes (${sceneCount})</h3>
        ${story.scenes.map((scene, idx) => `
          <div class="scene-block">
            <h4>Scene ${idx + 1} — ${scene.poseFamily || 'unknown pose'}</h4>
            <p>${scene.reusableWording || scene.exactWording || 'No wording available.'}</p>
            ${scene.dna ? `<p style="margin-top: 8px; color: #888; font-size: 12px;">DNA: ${scene.dna}</p>` : ''}
          </div>
        `).join('')}
      </div>
    `;
  }
  
  drawerBody.innerHTML = `
    <div class="drawer-title">${story.title}</div>
    <div class="drawer-meta">
      <span><strong>Seed:</strong> ${story.seedMode || 'unknown'}</span>
      <span><strong>Band:</strong> ${story.matchBand || 'N/A'}</span>
      <span><strong>Score:</strong> ${story.score || 0}</span>
      <span><strong>Scenes:</strong> ${sceneCount}</span>
    </div>
    
    ${story.summary ? `
      <div class="drawer-section">
        <h3>Summary</h3>
        <p>${story.summary}</p>
      </div>
    ` : ''}
    
    ${story.tags && story.tags.length > 0 ? `
      <div class="drawer-section">
        <h3>Tags</h3>
        <div class="story-tags">
          ${story.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
        </div>
      </div>
    ` : ''}
    
    ${scenesHTML}
  `;
  
  drawer.classList.add('open');
}

// Close drawer
closeDrawer.onclick = () => {
  drawer.classList.remove('open');
};

// Update KPIs
function updateKPIs() {
  kpiTotal.textContent = DB.stories.length;
  kpiVisible.textContent = filteredStories.length;
  
  const totalScenes = filteredStories.reduce((sum, story) => {
    return sum + (story.scenes ? story.scenes.length : 0);
  }, 0);
  kpiScenes.textContent = totalScenes;
}

// Event listeners
searchInput.addEventListener('input', applyFilters);
seedModeFilter.addEventListener('change', applyFilters);
matchBandFilter.addEventListener('change', applyFilters);

// Initialize
applyFilters();
</script>
